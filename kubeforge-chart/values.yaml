replicaCount: 3

image:
  repository: kubeforge
  tag: latest
  pullPolicy: Never

service:
  type: NodePort
  port: 8080
  nodePort: 30000

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

env:
  ENVIRONMENT: "production"
  OPENAI_API_KEY: ""
  SLACK_WEBHOOK_URL: ""
